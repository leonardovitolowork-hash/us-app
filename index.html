<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Us ♥</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#f8f0ff" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f0ff;
      --card: #ffffff;
      --text: #1a1a2e;
      --subtext: #666;
      --border: #e8d5f5;
      --accent: #9b59b6;
      --accent2: #e91e8c;
      --shadow: 0 2px 12px rgba(155,89,182,0.10);
      --pill-bg: #f3e8ff;
    }

    body.dark {
      --bg: #12091a;
      --card: #1e1030;
      --text: #f0e6ff;
      --subtext: #a888cc;
      --border: #3a2255;
      --accent: #c084fc;
      --accent2: #f472b6;
      --shadow: 0 2px 12px rgba(0,0,0,0.4);
      --pill-bg: #2a1540;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    /* HEADER */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      padding: 16px 20px 10px;
      border-bottom: 1px solid var(--border);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .header-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header-title span { color: var(--accent2); }

    .header-right { display: flex; gap: 10px; align-items: center; }

    .sync-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #ccc;
      display: inline-block;
      transition: background 0.3s;
    }
    .sync-dot.live { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    .sync-dot.error { background: #ef4444; }

    .sync-label { font-size: 12px; color: var(--subtext); }

    .dark-toggle {
      background: none; border: none; cursor: pointer;
      font-size: 18px; padding: 2px 6px;
      border-radius: 8px;
    }

    /* WHO AM I */
    .identity-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 2px;
    }

    .identity-btn {
      flex: 1;
      padding: 8px 0;
      border-radius: 20px;
      border: 2px solid var(--border);
      background: var(--card);
      color: var(--subtext);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .identity-btn.active-leo {
      background: #3b82f6;
      border-color: #3b82f6;
      color: white;
    }

    .identity-btn.active-mimi {
      background: var(--accent2);
      border-color: var(--accent2);
      color: white;
    }

    /* MAIN CONTENT */
    .content { padding: 16px 16px 120px; max-width: 480px; margin: 0 auto; }

    /* ADD TASK */
    .add-section {
      background: var(--card);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .task-input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border 0.2s;
    }

    .task-input:focus { border-color: var(--accent); }

    .add-btn {
      padding: 10px 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 20px;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s;
      line-height: 1;
    }
    .add-btn:active { transform: scale(0.93); }

    /* OPTIONS ROW */
    .options-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .option-label {
      font-size: 11px;
      color: var(--subtext);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-right: 2px;
    }

    /* COLOR PILLS */
    .color-pills { display: flex; gap: 6px; }

    .color-pill {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border 0.15s;
    }
    .color-pill:hover { transform: scale(1.2); }
    .color-pill.selected { border-color: var(--text); transform: scale(1.2); }

    /* ASSIGN SELECT */
    .assign-select {
      padding: 5px 10px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }

    /* URGENT TOGGLE */
    .urgent-toggle {
      padding: 5px 12px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      color: var(--subtext);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .urgent-toggle.on {
      background: #fef3c7;
      border-color: #f59e0b;
      color: #92400e;
    }
    body.dark .urgent-toggle.on {
      background: #3d2a00;
      border-color: #f59e0b;
      color: #fcd34d;
    }

    /* FILTERS */
    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--subtext);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* TASK LIST */
    .section-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--subtext);
      margin: 18px 0 8px;
    }

    .task-card {
      background: var(--card);
      border-radius: 14px;
      padding: 12px 14px;
      margin-bottom: 8px;
      box-shadow: var(--shadow);
      border: 1.5px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 10px;
      transition: opacity 0.3s, transform 0.3s;
      position: relative;
      overflow: hidden;
    }

    .task-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      border-radius: 14px 0 0 14px;
    }

    .task-card.urgent::after {
      content: '⚡';
      position: absolute;
      top: 8px; right: 10px;
      font-size: 13px;
    }

    /* CHECK CIRCLE */
    .check-circle {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 2px solid var(--border);
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .check-circle:hover { border-color: var(--accent); }
    .check-circle.done {
      background: #22c55e;
      border-color: #22c55e;
    }
    .check-circle.done::after { content: '✓'; color: white; font-size: 13px; font-weight: 700; }

    .task-body { flex: 1; min-width: 0; }

    .task-text {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.4;
      word-break: break-word;
    }

    .task-card.completed .task-text {
      text-decoration: line-through;
      opacity: 0.5;
    }

    .task-meta {
      display: flex;
      gap: 6px;
      margin-top: 5px;
      flex-wrap: wrap;
      align-items: center;
    }

    .meta-pill {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 8px;
      background: var(--pill-bg);
      color: var(--subtext);
      font-weight: 600;
    }

    .meta-time { font-size: 11px; color: var(--subtext); }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--subtext);
      font-size: 16px;
      padding: 2px 4px;
      border-radius: 6px;
      opacity: 0.5;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }
    .delete-btn:hover { opacity: 1; color: #ef4444; }

    /* COMPLETED SECTION */
    .completed-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      margin: 16px 0 6px;
      user-select: none;
    }

    .completed-toggle-icon {
      font-size: 13px;
      transition: transform 0.2s;
    }
    .completed-toggle-icon.open { transform: rotate(90deg); }

    .completed-list { display: none; }
    .completed-list.open { display: block; }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--subtext);
    }
    .empty-state .emoji { font-size: 40px; margin-bottom: 10px; }
    .empty-state p { font-size: 15px; }

    /* CONFETTI */
    .confetti-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 9999;
      overflow: hidden;
    }

    .confetti-piece {
      position: absolute;
      width: 8px; height: 8px;
      border-radius: 2px;
      animation: confetti-fall 1.2s ease-out forwards;
    }

    @keyframes confetti-fall {
      0% { opacity: 1; transform: translateY(-20px) rotate(0deg); }
      100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a2e;
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.3s;
      z-index: 1000;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* RESPONSIVE */
    @media (max-width: 360px) {
      .options-row { gap: 4px; }
      .color-pill { width: 20px; height: 20px; }
    }
  </style>
</head>
<body>

<!-- CONFETTI -->
<div class="confetti-container" id="confettiContainer"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="header-title">Us <span>♥</span></div>
    <div class="header-right">
      <span class="sync-dot" id="syncDot"></span>
      <span class="sync-label" id="syncLabel">Connecting…</span>
      <button class="dark-toggle" id="darkToggle" title="Toggle dark mode">🌙</button>
    </div>
  </div>
  <div class="identity-bar">
    <button class="identity-btn" id="btnLeo" onclick="setIdentity('Leo')">💙 Leo</button>
    <button class="identity-btn" id="btnMimi" onclick="setIdentity('Mimi')">🌸 Mimi</button>
  </div>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- ADD TASK -->
  <div class="add-section">
    <div class="add-row">
      <input class="task-input" id="taskInput" placeholder="Add something for us…" maxlength="120" />
      <button class="add-btn" onclick="addTask()">+</button>
    </div>
    <div class="options-row">
      <span class="option-label">Colour</span>
      <div class="color-pills" id="colorPills"></div>
      <span class="option-label" style="margin-left:8px;">For</span>
      <select class="assign-select" id="assignSelect">
        <option value="Both">Both 💑</option>
        <option value="Leo">Leo 💙</option>
        <option value="Mimi">Mimi 🌸</option>
      </select>
      <button class="urgent-toggle" id="urgentToggle" onclick="toggleUrgent()">⚡ Urgent</button>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('Leo', this)">💙 Leo</button>
    <button class="filter-btn" onclick="setFilter('Mimi', this)">🌸 Mimi</button>
    <button class="filter-btn" onclick="setFilter('Both', this)">💑 Both</button>
    <button class="filter-btn" onclick="setFilter('urgent', this)">⚡ Urgent</button>
  </div>

  <!-- ACTIVE TASKS -->
  <div id="taskList"></div>

  <!-- COMPLETED -->
  <div class="completed-toggle" onclick="toggleCompleted()">
    <span class="completed-toggle-icon" id="completedIcon">▶</span>
    <span class="section-title" style="margin:0;">Completed</span>
    <span id="completedCount" style="font-size:12px;color:var(--subtext);"></span>
  </div>
  <div class="completed-list" id="completedList"></div>

</div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, push, remove, update }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDYXsP91ZKrEMRIvHk1DXTniEa_Cth3N5Q",
    authDomain: "to-do-58ecc.firebaseapp.com",
    databaseURL: "https://to-do-58ecc-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "to-do-58ecc",
    storageBucket: "to-do-58ecc.firebasestorage.app",
    messagingSenderId: "600846617101",
    appId: "1:600846617101:web:97a51c8e6de97c83e02e0c",
    measurementId: "G-QJP96Z8X8F"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const tasksRef = ref(db, 'tasks');

  // Expose db helpers globally
  window._db = db;
  window._tasksRef = tasksRef;
  window._push = push;
  window._remove = remove;
  window._update = update;
  window._ref = ref;

  // SYNC STATUS
  const syncDot = document.getElementById('syncDot');
  const syncLabel = document.getElementById('syncLabel');

  const connRef = ref(db, '.info/connected');
  onValue(connRef, (snap) => {
    if (snap.val()) {
      syncDot.className = 'sync-dot live';
      syncLabel.textContent = 'Live ✓';
    } else {
      syncDot.className = 'sync-dot error';
      syncLabel.textContent = 'Offline';
    }
  });

  // LISTEN TO TASKS
  onValue(tasksRef, (snap) => {
    window._tasks = {};
    if (snap.exists()) {
      snap.forEach(child => {
        window._tasks[child.key] = child.val();
      });
    }
    renderTasks();
  });
</script>

<script>
  // ── STATE ──────────────────────────────────────────────
  let identity = localStorage.getItem('us_identity') || null;
  let selectedColor = 'purple';
  let urgentOn = false;
  let activeFilter = 'all';
  let completedOpen = false;
  window._tasks = {};

  const COLORS = {
    purple: '#9b59b6',
    blue:   '#3b82f6',
    pink:   '#e91e8c',
    green:  '#22c55e',
    yellow: '#f59e0b',
    red:    '#ef4444'
  };

  // ── INIT ───────────────────────────────────────────────
  function init() {
    buildColorPills();
    if (identity) setIdentity(identity, true);
    const dark = localStorage.getItem('us_dark') === '1';
    if (dark) document.body.classList.add('dark');
    document.getElementById('darkToggle').textContent = dark ? '☀️' : '🌙';
    document.getElementById('darkToggle').onclick = toggleDark;
    document.getElementById('taskInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });
  }

  // ── IDENTITY ───────────────────────────────────────────
  function setIdentity(name, silent) {
    identity = name;
    localStorage.setItem('us_identity', name);
    document.getElementById('btnLeo').className =
      'identity-btn' + (name === 'Leo' ? ' active-leo' : '');
    document.getElementById('btnMimi').className =
      'identity-btn' + (name === 'Mimi' ? ' active-mimi' : '');
    if (!silent) showToast(`You're ${name} 💙`);
  }
  window.setIdentity = setIdentity;

  // ── DARK MODE ──────────────────────────────────────────
  function toggleDark() {
    const isDark = document.body.classList.toggle('dark');
    localStorage.setItem('us_dark', isDark ? '1' : '0');
    document.getElementById('darkToggle').textContent = isDark ? '☀️' : '🌙';
  }

  // ── COLOR PILLS ────────────────────────────────────────
  function buildColorPills() {
    const container = document.getElementById('colorPills');
    Object.entries(COLORS).forEach(([name, hex]) => {
      const div = document.createElement('div');
      div.className = 'color-pill' + (name === selectedColor ? ' selected' : '');
      div.style.background = hex;
      div.title = name;
      div.onclick = () => {
        selectedColor = name;
        document.querySelectorAll('.color-pill').forEach(p => p.classList.remove('selected'));
        div.classList.add('selected');
      };
      container.appendChild(div);
    });
  }

  // ── URGENT ─────────────────────────────────────────────
  function toggleUrgent() {
    urgentOn = !urgentOn;
    document.getElementById('urgentToggle').className =
      'urgent-toggle' + (urgentOn ? ' on' : '');
  }
  window.toggleUrgent = toggleUrgent;

  // ── FILTER ─────────────────────────────────────────────
  function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTasks();
  }
  window.setFilter = setFilter;

  // ── ADD TASK ───────────────────────────────────────────
  function addTask() {
    if (!identity) { showToast('Pick Leo or Mimi first! 👆'); return; }
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (!text) return;

    const task = {
      text,
      color: selectedColor,
      assign: document.getElementById('assignSelect').value,
      urgent: urgentOn,
      done: false,
      addedBy: identity,
      timestamp: Date.now()
    };

    window._push(window._tasksRef, task);
    input.value = '';
    urgentOn = false;
    document.getElementById('urgentToggle').className = 'urgent-toggle';
  }
  window.addTask = addTask;

  // ── COMPLETE ───────────────────────────────────────────
  function toggleDone(key) {
    const task = window._tasks[key];
    if (!task) return;
    const taskRef = window._ref(window._db, 'tasks/' + key);
    if (!task.done) {
      window._update(taskRef, { done: true, completedAt: Date.now() });
      fireConfetti();
    } else {
      window._update(taskRef, { done: false, completedAt: null });
    }
  }
  window.toggleDone = toggleDone;

  // ── DELETE ─────────────────────────────────────────────
  function deleteTask(key) {
    const taskRef = window._ref(window._db, 'tasks/' + key);
    window._remove(taskRef);
    showToast('Task removed 🗑️');
  }
  window.deleteTask = deleteTask;

  // ── RENDER ─────────────────────────────────────────────
  function renderTasks() {
    const tasks = window._tasks;
    const taskList = document.getElementById('taskList');
    const completedList = document.getElementById('completedList');

    let active = [];
    let completed = [];

    Object.entries(tasks).forEach(([key, t]) => {
      const item = { key, ...t };
      if (t.done) completed.push(item);
      else active.push(item);
    });

    // Filter
    const filterFn = (t) => {
      if (activeFilter === 'all') return true;
      if (activeFilter === 'urgent') return t.urgent;
      return t.assign === activeFilter;
    };

    // Sort: urgent first, then newest
    active.sort((a, b) => {
      if (a.urgent && !b.urgent) return -1;
      if (!a.urgent && b.urgent) return 1;
      return (b.timestamp || 0) - (a.timestamp || 0);
    });

    completed.sort((a, b) => (b.completedAt || 0) - (a.completedAt || 0));

    const filtered = active.filter(filterFn);

    if (filtered.length === 0) {
      taskList.innerHTML = `<div class="empty-state">
        <div class="emoji">🌸</div>
        <p>Nothing here yet<br>Add something for us!</p>
      </div>`;
    } else {
      taskList.innerHTML = filtered.map(t => taskCard(t)).join('');
    }

    const completedFiltered = completed.filter(filterFn);
    document.getElementById('completedCount').textContent =
      completedFiltered.length ? `(${completedFiltered.length})` : '';

    completedList.innerHTML = completedFiltered.length
      ? completedFiltered.map(t => taskCard(t)).join('')
      : '<div style="color:var(--subtext);font-size:14px;padding:8px 4px;">Nothing completed yet!</div>';
  }

  function taskCard(t) {
    const hex = COLORS[t.color] || COLORS.purple;
    const ago = timeAgo(t.timestamp);
    const assignLabel = t.assign === 'Leo' ? '💙 Leo' : t.assign === 'Mimi' ? '🌸 Mimi' : '💑 Both';
    return `
      <div class="task-card${t.done ? ' completed' : ''}${t.urgent ? ' urgent' : ''}"
           style="border-left-color:${hex};">
        <div class="check-circle${t.done ? ' done' : ''}" onclick="toggleDone('${t.key}')"></div>
        <div class="task-body">
          <div class="task-text">${escHtml(t.text)}</div>
          <div class="task-meta">
            <span class="meta-pill" style="background:${hex}22;color:${hex}">${assignLabel}</span>
            <span class="meta-pill">By ${escHtml(t.addedBy || '?')}</span>
            ${t.urgent ? '<span class="meta-pill" style="background:#fef3c7;color:#92400e;">⚡ Urgent</span>' : ''}
            <span class="meta-time">${ago}</span>
          </div>
        </div>
        <button class="delete-btn" onclick="deleteTask('${t.key}')" title="Delete">✕</button>
      </div>`;
  }

  // ── COMPLETED TOGGLE ───────────────────────────────────
  function toggleCompleted() {
    completedOpen = !completedOpen;
    document.getElementById('completedList').className =
      'completed-list' + (completedOpen ? ' open' : '');
    document.getElementById('completedIcon').className =
      'completed-toggle-icon' + (completedOpen ? ' open' : '');
  }
  window.toggleCompleted = toggleCompleted;

  // ── HELPERS ────────────────────────────────────────────
  function timeAgo(ts) {
    if (!ts) return '';
    const diff = Math.floor((Date.now() - ts) / 1000);
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── CONFETTI ───────────────────────────────────────────
  function fireConfetti() {
    const container = document.getElementById('confettiContainer');
    const colors = ['#9b59b6','#e91e8c','#3b82f6','#22c55e','#f59e0b','#ef4444'];
    for (let i = 0; i < 30; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.top = '-10px';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.animationDelay = Math.random() * 0.4 + 's';
      el.style.animationDuration = (0.9 + Math.random() * 0.6) + 's';
      container.appendChild(el);
      setTimeout(() => el.remove(), 1600);
    }
  }

  // ── TOAST ──────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
  window.showToast = showToast;

  // ── START ──────────────────────────────────────────────
  init();
</script>

</body>
