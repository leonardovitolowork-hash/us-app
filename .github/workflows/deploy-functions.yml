name: Deploy Firebase Functions

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install function dependencies
        run: cd functions && npm install

      - name: Set VAPID private key config
        run: |
          echo '${{ secrets.FIREBASE_SA_KEY }}' > /tmp/sa-key.json
          npx firebase-tools functions:config:set vapid.private_key="${{ secrets.VAPID_PRIVATE_KEY }}" --project to-do-58ecc
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa-key.json

      - name: Deploy functions
        run: |
          echo '${{ secrets.FIREBASE_SA_KEY }}' > /tmp/sa-key.json
          npx firebase-tools deploy --only functions --project to-do-58ecc --force
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa-key.json
